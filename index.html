<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Application de Passation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* APP */

#appPage{
    display:none;
    padding-top:85px;
    padding-bottom:80px;
}

/* ERROR PAGE */

#errorPage{
    display:none;
    width:100%;
    height:100vh;
    background:#b00000;
    color:white;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    padding:20px;
}

#errorPage i{
    font-size:90px;
    margin-bottom:20px;
}

#errorPage h1{
    font-size:40px;
    margin-bottom:20px;
}

#errorPage p{
    font-size:22px;
    margin-bottom:30px;
}

#errorPage .btn-retry{
    background:white;
    color:#b00000;
    border:none;
    padding:12px 30px;
    font-size:18px;
    font-weight:bold;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
    margin-top:20px;
}

#errorPage .btn-retry:hover{
    transform:scale(1.05);
    background:#f0f0f0;
}

/* HEADER */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#000;
    padding:15px;
    text-align:center;
    z-index:1000;
    border-bottom:2px solid #0d6efd;
}

/* FOOTER */

footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#000;
    color:white;
    text-align:center;
    padding:12px;
    font-weight:bold;
    border-top:2px solid #0d6efd;
    z-index:1000;
}

/* CONTAINER */

.main-container{
    max-width:1500px;
    margin:auto;
    padding:15px;
}

/* CARD */

.card-dark{
    background:#1e1e1e;
    border:none;
    border-radius:20px;
    box-shadow:0 2px 15px rgba(0,0,0,0.5);
}

/* TABLE */

.table{
    color:white;
}

.table thead{
    background:#0d6efd;
}

.table td,
.table th{
    background:#1e1e1e !important;
    color:white !important;
    border-color:#333;
    vertical-align:middle;
}

/* BADGES CLIQUABLES */
.badge-en-cours,
.badge-traite,
.mobile-badge-state {
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

.badge-en-cours:hover,
.badge-traite:hover,
.mobile-badge-state:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

.badge-en-cours{
    background:orange;
    padding:8px 12px;
    border-radius:10px;
    font-weight:bold;
    white-space:nowrap;
    display: inline-block;
}

.badge-traite{
    background:green;
    padding:8px 12px;
    border-radius:10px;
    font-weight:bold;
    white-space:nowrap;
    display: inline-block;
}

/* BUTTONS */

.top-buttons{
    display:flex;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.big-btn{
    border:none;
    border-radius:15px;
    padding:15px 25px;
    font-weight:bold;
    color:white;
    transition:0.3s;
}

.big-btn:hover{
    transform:scale(1.03);
}

.btn-passation{
    background:#0d6efd;
}

.btn-filtre{
    background:#6610f2;
}

/* ACTION BUTTONS */

.action-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    flex-wrap:nowrap;
}

.action-buttons .btn{
    transition:0.2s;
}

.action-buttons .btn:hover{
    transform:scale(1.08);
}

/* PASSATION TEXT */

.passation-text{
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    line-height:24px;
    max-height:48px;
    white-space: pre-line;
    text-align: justify;
}

.voir-plus{
    background:none;
    border:none;
    color:#0dcaf0;
    margin-top:5px;
    padding:0;
    font-size:14px;
}

.voir-plus:hover{
    text-decoration:underline;
}

/* OVERLAY */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.96);
    z-index:5000;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.overlay-content{
    width:100%;
    max-width:900px;
    height:90vh;
    background:#1e1e1e;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    border:2px solid #0d6efd;
}

.overlay-header{
    background:#000;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #333;
}

.overlay-actions{
    display:flex;
    align-items:center;
    gap:10px;
}

.overlay-body{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

/* CARTES REPONSES ET SOUS-REPONSES */
.reply-item{
    background:#2b2b2b;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    border-left:5px solid #0d6efd;
    position: relative;
}

.sub-reply-item {
    background: #202020;
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
    margin-left: 30px;
    border-left: 4px solid #0dcaf0;
    font-size: 14px;
}

.close-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:red;
    color:white;
    font-size:18px;
}

/* PERSON COLORS */

.nom-khawla{
    color:#ff4d6d;
    font-weight:bold;
}

.nom-seddik{
    color:#00d4ff;
    font-weight:bold;
}

.nom-salma{
    color:#00ff88;
    font-weight:bold;
}

.nom-lamia{
    color:#ffd500;
    font-weight:bold;
}

.nom-ichrak{
    color:#c77dff;
    font-weight:bold;
}

.nom-zakia{
    color:#ff8800;
    font-weight:bold;
}

/* MODALS */

.modal-content{
    background:#1e1e1e;
    color:white;
    border:2px solid #0d6efd;
    border-radius:20px;
}

.modal-header{
    border-bottom:1px solid #333;
}

.modal-footer{
    border-top:1px solid #333;
}

.form-control,
.form-select{
    background:#2a2a2a;
    border:1px solid #444;
    color:white;
}

.form-control:focus,
.form-select:focus{
    background:#2a2a2a;
    color:white;
    box-shadow:none;
    border-color:#0d6efd;
}

textarea{
    resize:none;
}

/* SWAL */

.swal2-popup{
    background:#1e1e1e !important;
    color:white !important;
}

.swal2-input,
.swal2-textarea,
.swal2-select{
    background:#2b2b2b !important;
    color:white !important;
    border:1px solid #444 !important;
}

.swal2-select{
    width:100% !important;
    max-width:300px !important;
    margin-left:auto !important;
    margin-right:auto !important;
    padding:8px 12px !important;
}

/* EMOJIS */

.emoji-box{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-top:15px;
}

.emoji-btn{
    background:#2b2b2b;
    border:1px solid #444;
    width:45px;
    height:45px;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

.emoji-btn:hover{
    transform:scale(1.1);
    background:#0d6efd;
}

/* FLATPICKR STYLE SOMBRE */

.flatpickr-calendar {
    background: #1a1a1a !important;
    border: 1px solid #0d6efd !important;
    border-radius: 16px !important;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7) !important;
    font-family: Arial, sans-serif !important;
    padding: 6px !important;
}

.flatpickr-calendar.arrowTop:before, .flatpickr-calendar.arrowTop:after {
    border-bottom-color: #0d6efd !important;
}
.flatpickr-calendar.arrowBottom:before, .flatpickr-calendar.arrowBottom:after {
    border-top-color: #0d6efd !important;
}

.flatpickr-calendar .flatpickr-months {
    padding: 5px 0 !important;
}

.flatpickr-calendar .flatpickr-month {
    background: #1a1a1a !important;
    color: #ffffff !important;
}

.flatpickr-calendar .flatpickr-current-month {
    color: #ffffff !important;
    font-size: 110% !important;
}

.flatpickr-calendar .flatpickr-current-month .flatpickr-monthDropdown-months,
.flatpickr-calendar .numInputWrapper select, 
.flatpickr-calendar .numInputWrapper input {
    color: #ffffff !important;
    background: #262626 !important;
    border-radius: 6px !important;
    font-weight: bold !important;
    padding: 2px 6px !important;
    border: 1px solid #333 !important;
}

.flatpickr-calendar .flatpickr-prev-month,
.flatpickr-calendar .flatpickr-next-month {
    color: #ffffff !important;
    fill: #ffffff !important;
    padding: 10px !important;
    border-radius: 50% !important;
    transition: background 0.2s, color 0.2s !important;
}

.flatpickr-calendar .flatpickr-prev-month:hover,
.flatpickr-calendar .flatpickr-next-month:hover {
    background: #0d6efd !important;
    color: #ffffff !important;
    fill: #ffffff !important;
}

span.flatpickr-weekday {
    color: #0d6efd !important;
    font-weight: bold !important;
    font-size: 90% !important;
}

.flatpickr-day {
    color: #e0e0e0 !important;
    border-radius: 8px !important;
    transition: all 0.2s ease !important;
    margin: 2px 0 !important;
}

.flatpickr-day:hover,
.flatpickr-day:focus {
    background: #2a2a2a !important;
    border-color: #0d6efd !important;
    color: #ffffff !important;
}

.flatpickr-day.selected,
.flatpickr-day.selected:hover {
    background: #0d6efd !important;
    border-color: #0d6efd !important;
    color: #ffffff !important;
    font-weight: bold !important;
    box-shadow: 0 4px 10px rgba(13, 110, 253, 0.4) !important;
}

.flatpickr-day.today {
    border-color: #00ff88 !important;
    color: #00ff88 !important;
    font-weight: bold !important;
}

.flatpickr-day.today:hover {
    background: #00ff88 !important;
    color: #000000 !important;
    border-color: #00ff88 !important;
}

.flatpickr-day.prevMonthDay,
.flatpickr-day.nextMonthDay {
    color: #555555 !important;
}

.flatpickr-day.prevMonthDay:hover,
.flatpickr-day.nextMonthDay:hover {
    background: #222222 !important;
    color: #888888 !important;
}

.flatpickr-calendar .numInputWrapper span.arrowUp,
.flatpickr-calendar .numInputWrapper span.arrowDown {
    background-color: #0d6efd !important;
    border-color: #0d6efd !important;
}

/* STYLES MOBILES */
#mobileListContainer {
    display: none;
}

@media(max-width:768px){
    .table-responsive{
        display: none !important;
    }

    #mobileListContainer {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 5px;
    }

    .card-mobile-passation {
        background: #252525;
        border-radius: 15px;
        padding: 15px;
        border-left: 5px solid #0d6efd;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .card-mobile-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #383838;
        padding-bottom: 8px;
        margin-bottom: 10px;
    }

    .card-mobile-body {
        font-size: 14px;
        color: #e0e0e0;
        line-height: 20px;
    }

    .card-mobile-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #383838;
    }

    .mobile-badge-state {
        font-size: 11px;
        font-weight: bold;
        padding: 4px 8px;
        border-radius: 6px;
    }

    .mobile-actions {
        display: flex;
        gap: 6px;
    }

    .btn{
        font-size:12px;
    }

    .big-btn{
        width:100%;
        font-size: 14px;
        padding: 12px;
    }
    
    .swal2-select{
        max-width:250px !important;
    }
}

</style>
</head>

                <button id="btnOverlayRepondre" class="btn btn-success btn-sm">
                    <i class="fa-solid fa-reply"></i> Nouvelle Réponse
                </button>
                <button class="close-btn" onclick="fermerOverlay()">
                    <i class="fa-solid fa-xmark"></i>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyYVYbXz6N3BCru127JY0RIAkRlmiCToDm2KZwPV276Zatb9eIlX64zoUPxjmcQGF2-/exec";

const listePersonnes = ["Khawla", "Seddik", "Salma", "Lamia", "Ichrak", "Zakia"];
const motsDePasse = [...listePersonnes];

let flatpickrInstances = [];
let passations = [];

function initDatepickers(){
    flatpickrInstances.forEach(instance => { if(instance && instance.destroy) instance.destroy(); });
    flatpickrInstances = [];
    
    document.querySelectorAll('.datepicker').forEach(input => {
        const instance = flatpickr(input, {
            dateFormat: "d/m/Y",
            locale: "fr",
            allowInput: true,
            theme: "dark",
            onChange: function(selectedDates) {
                if(selectedDates.length > 0){
                    let jour = selectedDates[0].getDate().toString().padStart(2,'0');
                    let mois = (selectedDates[0].getMonth() + 1).toString().padStart(2,'0');
                    let annee = selectedDates[0].getFullYear();
                    input.value = `${jour}/${mois}/${annee}`;
                }
            }
        });
        flatpickrInstances.push(instance);
    });
}

function validerDate(dateStr){
    let regex = /^(\d{2})\/(\d{2})\/(\d{4})$/;
    if(!regex.test(dateStr)) return false;
    let jour = parseInt(RegExp.$1), mois = parseInt(RegExp.$2), annee = parseInt(RegExp.$3);
    if(mois < 1 || mois > 12 || jour < 1 || jour > 31) return false;
    if((mois === 4 || mois === 6 || mois === 9 || mois === 11) && jour > 30) return false;
    if(mois === 2){
        let bissextile = (annee % 4 === 0 && annee % 100 !== 0) || (annee % 400 === 0);
        if(jour > (bissextile ? 29 : 28)) return false;
    }
    return true;
}

function formaterDateISO(dateStr) {
    if (!dateStr) return "";
    if (dateStr.includes('T') || dateStr.includes('-')) {
        try {
            let d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
                return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
            }
        } catch (e) { console.error(e); }
    }
    return dateStr;
}

function retryLogin(){
    document.getElementById("errorPage").style.display = "none";
    demanderMotDePasse();
}

function demanderMotDePasse(){
    Swal.fire({
        title:'Accès sécurisé',
        html:`<input type="password" id="passwordAccess" class="swal2-input" placeholder="Mot de passe">`,
        allowOutsideClick:false,
        allowEscapeKey:false,
        confirmButtonText:'Accéder',
        preConfirm:()=>{
            let password = document.getElementById("passwordAccess").value;
            if(!password){ Swal.showValidationMessage("Veuillez saisir le mot de passe"); return false; }
            return password;
        }
    }).then((result)=>{
        if(result.isConfirmed){
            if(motsDePasse.includes(result.value)){
                document.getElementById("appPage").style.display = "block";
                setTimeout(() => { initDatepickers(); }, 100);
                chargerDepuisGoogleSheet();
            }else{
                document.getElementById("errorPage").style.display = "flex";
            }
        }
    });
}

window.onload = function(){ demanderMotDePasse(); };
document.addEventListener('shown.bs.modal', function(){ setTimeout(() => { initDatepickers(); }, 100); });

function chargerDepuisGoogleSheet() {
    Swal.fire({ title: 'Chargement...', text: 'Veuillez patienter.', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
    fetch(WEB_APP_URL)
        .then(response => response.json())
        .then(data => {
            passations = data.map(item => {
                if (!item.reponses || !Array.isArray(item.reponses)) item.reponses = [];
                item.date = formaterDateISO(item.date);
                return item;
            });
            afficherPassations();
            Swal.close();
        })
        .catch(error => {
            console.error(error);
            Swal.fire({ icon: 'error', title: 'Erreur', text: 'Impossible de joindre Google Sheets.' });
        });
}

function sauvegarder(){
    afficherPassations(); 
    fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "sauvegarderTout", data: passations })
    }).catch(error => { console.error(error); });
}

function getNomClass(nom){
    switch(nom){
        case "Khawla": return "nom-khawla";
        case "Seddik": return "nom-seddik";
        case "Salma": return "nom-salma";
        case "Lamia": return "nom-lamia";
        case "Ichrak": return "nom-ichrak";
        case "Zakia": return "nom-zakia";
        default: return "";
    }
}

function ajouterPassation(){
    let personne = document.getElementById("personne").value;
    let date = document.getElementById("datePassation").value;
    let message = document.getElementById("messagePassation").value;

    if(!personne || !date || !message.trim()){ Swal.fire({ icon:'warning', title:'Tous les champs sont obligatoires' }); return; }
    if(!validerDate(date)){ Swal.fire({ icon:'error', title:'Date invalide' }); return; }

    passations.unshift({ id: Date.now(), personne, date, message: message.trim(), etat: "En cours", traitePar: "", reponses: [] });
    sauvegarder();
    bootstrap.Modal.getInstance(document.getElementById('modalPassation')).hide();
    
    document.getElementById("personne").value = "";
    document.getElementById("datePassation").value = "";
    document.getElementById("messagePassation").value = "";
    Swal.fire({ icon:'success', title:'Passation ajoutée !', timer: 1500, showConfirmButton: false });
}

function afficherPassations(){
    let tbody = document.getElementById("tablePassations");
    let mobileContainer = document.getElementById("mobileListContainer");
    let filterDate = document.getElementById("filterDate").value;
    let filterEtat = document.getElementById("filterEtat").value;

    tbody.innerHTML = ""; mobileContainer.innerHTML = "";

    let liste = passations.filter(p=>{
        return (filterDate === "" || p.date === filterDate) && (filterEtat === "" || p.etat === filterEtat);
    });

    if(liste.length === 0){
        tbody.innerHTML = `<tr><td colspan="6" class="text-center">Aucune passation trouvée</td></tr>`;
        mobileContainer.innerHTML = `<div class="text-center p-4 text-muted">Aucune passation trouvée</div>`;
        return;
    }

    liste.forEach(p=>{
        let badge = p.etat === "En cours" ? 
            `<span class="badge-en-cours" onclick="changerEtat(${p.id})">En cours</span>` : 
            `<span class="badge-traite" onclick="changerEtat(${p.id})">Traité par : ${p.traitePar}</span>`;

        let badgeColorMobile = p.etat === "En cours" ? "orange" : "green";
        let stateTextMobile = p.etat === "En cours" ? "En cours" : `Traité par: ${p.traitePar}`;
        
        // Calcule le total (réponses principales + sous-réponses)
        let totalReponses = 0;
        if(p.reponses) {
            p.reponses.forEach(r => {
                totalReponses++;
                if(r.subReplies) totalReponses += r.subReplies.length;
            });
        }

        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong class="${getNomClass(p.personne)}">${p.personne}</strong></td>
            <td>${p.date}</td>
            <td>
                <div class="passation-text">${p.message.substring(0, 120)}${p.message.length > 120 ? '...' : ''}</div>
                ${p.message.length > 120 ? `<button class="voir-plus btn-read-more">Voir plus</button>` : ""}
            </td>
            <td>${badge}</td>
            <td class="text-center">
                <button class="btn btn-info btn-sm text-white" onclick="ouvrirOverlay(${p.id})">
                    <i class="fa-solid fa-comments"></i> (${totalReponses})
                </button>
            </td>
            <td class="text-center">
                <div class="action-buttons">
                    <button class="btn btn-success btn-sm" onclick="repondre(${p.id})" title="Répondre"><i class="fa-solid fa-reply"></i></button>
                    <button class="btn btn-primary btn-sm" onclick="modifierPassation(${p.id})"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-info btn-sm text-white" onclick="modifierReponses(${p.id})"><i class="fa-solid fa-comment-dots"></i></button>
                    <button class="btn btn-warning btn-sm" onclick="changerEtat(${p.id})"><i class="fa-solid fa-rotate"></i></button>
                    <button class="btn btn-danger btn-sm" onclick="supprimerPassation(${p.id})"><i class="fa-solid fa-trash"></i></button>
                </div>
            </td>
        `;
        
        let btnMorePc = tr.querySelector('.btn-read-more');
        if(btnMorePc) btnMorePc.addEventListener('click', function() { voirPassation(p.message); });
        tbody.appendChild(tr);

        let mobileCard = document.createElement('div');
        mobileCard.className = 'card-mobile-passation';
        mobileCard.style.borderLeftColor = badgeColorMobile;
        mobileCard.innerHTML = `
            <div class="card-mobile-header">
                <div>
                    <strong class="${getNomClass(p.personne)}">${p.personne}</strong>
                    <div style="font-size: 11px; color: #aaa; margin-top: 2px;"><i class="fa-solid fa-calendar-day"></i> ${p.date}</div>
                </div>
                <span class="mobile-badge-state" style="background: ${badgeColorMobile}; color: white;" onclick="changerEtat(${p.id})">${stateTextMobile}</span>
            </div>
            <div class="card-mobile-body">
                <div class="passation-text">${p.message.substring(0, 110)}${p.message.length > 110 ? '...' : ''}</div>
                ${p.message.length > 110 ? `<button class="voir-plus btn-read-more-mobile">Lire la suite</button>` : ""}
            </div>
            <div class="card-mobile-footer">
                <button class="btn btn-info btn-sm text-white px-2 py-1" onclick="ouvrirOverlay(${p.id})">
                    <i class="fa-solid fa-comments"></i> Réponses (${totalReponses})
                </button>
                <div class="mobile-actions">
                    <button class="btn btn-success btn-sm p-2" onclick="repondre(${p.id})"><i class="fa-solid fa-reply"></i></button>
                    <button class="btn btn-primary btn-sm p-2" onclick="modifierPassation(${p.id})"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-info btn-sm text-white p-2" onclick="modifierReponses(${p.id})"><i class="fa-solid fa-comment-dots"></i></button>
                    <button class="btn btn-warning btn-sm p-2" onclick="changerEtat(${p.id})"><i class="fa-solid fa-rotate"></i></button>
                    <button class="btn btn-danger btn-sm p-2" onclick="supprimerPassation(${p.id})"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        `;
        
        let btnMoreMobile = mobileCard.querySelector('.btn-read-more-mobile');
        if(btnMoreMobile) btnMoreMobile.addEventListener('click', function() { voirPassation(p.message); });
        mobileContainer.appendChild(mobileCard);
    });
}

function voirPassation(message){
    Swal.fire({
        title:'Passation complète',
        html:`<div style="text-align: justify; max-height:400px; overflow:auto; padding:10px; line-height:28px; font-size:16px; white-space: pre-line;"></div>`,
        width:800,
        didOpen: () => { Swal.getHtmlContainer().querySelector('div').textContent = message; }
    });
}

function appliquerFiltres(){ bootstrap.Modal.getInstance(document.getElementById('modalFiltre')).hide(); afficherPassations(); }
function resetFiltres(){ document.getElementById("filterDate").value = ""; document.getElementById("filterEtat").value = ""; afficherPassations(); bootstrap.Modal.getInstance(document.getElementById('modalFiltre')).hide(); }

function genererOptionsPersonnes(selectedValue = ""){
    return listePersonnes.map(p => `<option value="${p}" ${p === selectedValue ? 'selected' : ''}>${p}</option>`).join('');
}

/* SYSTÈME DE RÉPONSE (PRINCIPALE OU SOUS-RÉPONSE CLIBLÉE) */
function repondre(id, parentReplyId = null) {
    let passation = passations.find(p => p.id === id);
    if(!passation) return;

    let overlay = document.getElementById('overlayReponses');
    let overlayEtaitOuvert = (overlay && overlay.style.display === 'flex');
    if (overlayEtaitOuvert) overlay.style.display = 'none';

    let titrePopup = "Nouvelle réponse";
    if(parentReplyId) {
        let pRep = passation.reponses.find(r => r.id === parentReplyId);
        if(pRep) titrePopup = `Répondre à ${pRep.personne}`;
    }

    Swal.fire({
        title: titrePopup,
        html:`
            <div style="text-align:left; margin-bottom:15px;">
                <label style="color:white; margin-bottom:10px; display:block;">Répondre en tant que :</label>
                <select id="repondrePersonne" class="swal2-select" style="width:100%; padding:8px 12px;">
                    <option value="">Choisir...</option>
                    ${genererOptionsPersonnes()}
                </select>
            </div>
            <div style="text-align:left; margin-bottom:15px;">
                <label style="color:white; margin-bottom:10px; display:block;">Votre message :</label>
                <textarea id="reponseTexte" class="swal2-textarea" rows="5" placeholder="Écrire un message..."></textarea>
            </div>
            <div class="emoji-box">
                <button type="button" class="emoji-btn" onclick="ajouterEmoji('😊')">😊</button>
                <button type="button" class="emoji-btn" onclick="ajouterEmoji('👍')">👍</button>
                <button type="button" class="emoji-btn" onclick="ajouterEmoji('✅')">✅</button>
                <button type="button" class="emoji-btn" onclick="ajouterEmoji('⚠️')">⚠️</button>
                <button type="button" class="emoji-btn" onclick="ajouterEmoji('🔔')">🔔</button>
                <button type="button" class="emoji-btn" onclick="ajouterEmoji('❌')">❌</button>
            </div>
        `,
        confirmButtonText:'Envoyer',
        showCancelButton: true,
        cancelButtonText: 'Annuler',
        preConfirm:()=>{
            let personneReponse = document.getElementById('repondrePersonne').value;
            let texte = document.getElementById('reponseTexte').value;

            if(!personneReponse){ Swal.showValidationMessage('Veuillez choisir qui répond'); return false; }
            if(!texte.trim()){ Swal.showValidationMessage('Veuillez écrire un message'); return false; }
            
            return { personne: personneReponse, texte: texte.trim() };
        }
    }).then((result)=>{
        if(result.isConfirmed){
            if(!passation.reponses) passation.reponses = [];

            let nouvelObjet = {
                id: Date.now(),
                personne: result.value.personne,
                texte: result.value.texte,
                date: new Date().toLocaleDateString('fr-FR'),
                heure: new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'})
            };

            if(parentReplyId) {
                // Ajout comme sous-réponse
                let reponseParente = passation.reponses.find(r => r.id === parentReplyId);
                if(reponseParente) {
                    if(!reponseParente.subReplies) reponseParente.subReplies = [];
                    reponseParente.subReplies.push(nouvelObjet);
                }
            } else {
                // Ajout comme réponse principale
                nouvelObjet.subReplies = [];
                passation.reponses.push(nouvelObjet);
            }

            sauvegarder();
            if(overlayEtaitOuvert) ouvrirOverlay(id);
            Swal.fire({ icon:'success', title:'Message envoyé', timer: 1500, showConfirmButton: false });
        } else {
            if(overlayEtaitOuvert) overlay.style.display = 'flex';
        }
    });
}

function ajouterEmoji(emoji){
    let textarea = document.getElementById('reponseTexte');
    if(textarea){
        let start = textarea.selectionStart, end = textarea.selectionEnd;
        textarea.value = textarea.value.substring(0, start) + emoji + textarea.value.substring(end);
        textarea.selectionStart = textarea.selectionEnd = start + emoji.length;
        textarea.focus();
    }
}

function modifierPassation(id){
    let passation = passations.find(p => p.id === id); if(!passation) return;

    Swal.fire({
        title:'Modifier la passation',
        html:`
            <select id="modifPersonne" class="swal2-select" style="margin-bottom:15px; width:100%; padding:8px 12px;">${genererOptionsPersonnes(passation.personne)}</select>
            <input type="text" id="modifDate" class="swal2-input" value="${passation.date}" placeholder="JJ/MM/AAAA" style="margin-bottom:15px;">
            <textarea id="modifMessage" class="swal2-textarea" rows="6"></textarea>
        `,
        confirmButtonText:'Modifier',
        didOpen: () => {
            document.getElementById('modifMessage').value = passation.message;
            setTimeout(() => { flatpickr(document.getElementById('modifDate'), { dateFormat: "d/m/Y", locale: "fr", allowInput: true, defaultDate: passation.date }); }, 50);
        },
        preConfirm:()=>{
            let p = document.getElementById('modifPersonne').value, d = document.getElementById('modifDate').value, m = document.getElementById('modifMessage').value;
            if(!p || !d || !m.trim()){ Swal.showValidationMessage('Tous les champs sont obligatoires'); return false; }
            if(!validerDate(d)){ Swal.showValidationMessage('Date invalide (JJ/MM/AAAA)'); return false; }
            return { personne: p, date: d, message: m.trim() };
        }
    }).then((result)=>{
        if(result.isConfirmed){
            passation.personne = result.value.personne; passation.date = result.value.date; passation.message = result.value.message;
            sauvegarder();
            Swal.fire({ icon:'success', title:'Passation modifiée', timer: 1500, showConfirmButton: false });
        }
    });
}

/* INTERFACE GESTION/SUPPRESSION DES REPONSES ET SOUS-REPONSES */
function modifierReponses(id){
    let passation = passations.find(p => p.id === id); if(!passation) return;

    if(!passation.reponses || passation.reponses.length === 0){
        Swal.fire({ icon:'info', title:'Aucune réponse' }); return;
    }

    let reponsesHtml = '<div style="max-height:450px; overflow:auto; text-align:left;">';
    passation.reponses.forEach((r, idx) => {
        reponsesHtml += `
            <div class="reply-item">
                <strong>Réponse ${idx + 1} par <span class="${getNomClass(r.personne)}">${r.personne}</span></strong>
                <p style="margin:5px 0; font-size:14px; white-space:pre-line;" class="m-rep-text"></p>
                <button class="btn btn-danger btn-sm py-1 px-2" onclick="supprimerReponsePrincipale(${id}, ${r.id})">
                    <i class="fa-solid fa-trash"></i> Supprimer la réponse
                </button>
        `;
        
        if(r.subReplies && r.subReplies.length > 0) {
            r.subReplies.forEach((sub) => {
                reponsesHtml += `
                    <div class="sub-reply-item">
                        <strong>Sous-réponse de <span class="${getNomClass(sub.personne)}">${sub.personne}</span></strong>
                        <p style="margin:4px 0; white-space:pre-line;" class="m-sub-text"></p>
                        <button class="btn btn-outline-danger btn-sm py-0 px-2" style="font-size:11px;" onclick="supprimerSousReponse(${id}, ${r.id}, ${sub.id})">
                            <i class="fa-solid fa-trash"></i> Effacer
                        </button>
                    </div>
                `;
            });
        }
        reponsesHtml += `</div>`;
    });
    reponsesHtml += '</div>';

    Swal.fire({ 
        title:'Gérer les réponses', html: reponsesHtml, width:700, confirmButtonText:'Fermer',
        didOpen: () => {
            let pTexts = Swal.getHtmlContainer().querySelectorAll('.m-rep-text');
            let flatSubTexts = Swal.getHtmlContainer().querySelectorAll('.m-sub-text');
            
            let pIdx = 0, sIdx = 0;
            passation.reponses.forEach(r => {
                if(pTexts[pIdx]) pTexts[pIdx].textContent = r.texte;
                pIdx++;
                if(r.subReplies) {
                    r.subReplies.forEach(sub => {
                        if(flatSubTexts[sIdx]) flatSubTexts[sIdx].textContent = sub.texte;
                        sIdx++;
                    });
                }
            });
        }
    });
}

function supprimerReponsePrincipale(passationId, reponseId){
    Swal.fire({ title:'Supprimer cette réponse ?', text:'Cela effacera aussi ses sous-réponses.', icon:'warning', showCancelButton:true, confirmButtonColor:'#d33' }).then((result)=>{
        if(result.isConfirmed){
            let p = passations.find(x => x.id === passationId);
            if(p) {
                p.reponses = p.reponses.filter(r => r.id !== reponseId);
                sauvegarder(); Swal.close();
                if(document.getElementById('overlayReponses').style.display === 'flex') ouvrirOverlay(passationId);
                setTimeout(() => { modifierReponses(passationId); }, 200);
            }
        }
    });
}

function supprimerSousReponse(passationId, parentId, subId){
    Swal.fire({ title:'Supprimer cette sous-réponse ?', icon:'warning', showCancelButton:true, confirmButtonColor:'#d33' }).then((result)=>{
        if(result.isConfirmed){
            let p = passations.find(x => x.id === passationId);
            if(p) {
                let parent = p.reponses.find(r => r.id === parentId);
                if(parent && parent.subReplies) {
                    parent.subReplies = parent.subReplies.filter(s => s.id !== subId);
                    sauvegarder(); Swal.close();
                    if(document.getElementById('overlayReponses').style.display === 'flex') ouvrirOverlay(passationId);
                    setTimeout(() => { modifierReponses(passationId); }, 200);
                }
            }
        }
    });
}

function changerEtat(id){
    let passation = passations.find(p => p.id === id); if(!passation) return;
    let nouveauEtat = passation.etat === "En cours" ? "Traité" : "En cours";

    if(nouveauEtat === "Traité"){
        Swal.fire({
            title:'Passer à Traité',
            html:`<select id="traiteParSelect" class="swal2-select"><option value="">Choisir la personne...</option>${genererOptionsPersonnes(passation.traitePar)}</select>`,
            confirmButtonText:'Valider',
            preConfirm:()=>{
                let nom = document.getElementById('traiteParSelect').value;
                if(!nom){ Swal.showValidationMessage('Veuillez choisir la personne'); return false; }
                return nom;
            }
        }).then((result)=>{
            if(result.isConfirmed){ passation.etat = nouveauEtat; passation.traitePar = result.value; sauvegarder(); }
        });
    }else{
        passation.etat = nouveauEtat; passation.traitePar = ""; sauvegarder();
    }
}

function supprimerPassation(id){
    Swal.fire({ title:'Supprimer cette passation ?', icon:'warning', showCancelButton:true, confirmButtonColor:'#d33' }).then((result)=>{
        if(result.isConfirmed){ passations = passations.filter(p => p.id !== id); sauvegarder(); }
    });
}

/* AFFICHAGE DES FILLES DE DISCUSSION IMBRIQUÉS DANS L'OVERLAY */
function ouvrirOverlay(id){
    let passation = passations.find(p => p.id === id);
    if(!passation) return;

    let overlay = document.getElementById('overlayReponses');
    let liste = document.getElementById('listeReponses');

    document.getElementById('btnOverlayRepondre').onclick = function() { repondre(id); };

    if(!passation.reponses || passation.reponses.length === 0){
        liste.innerHTML = `
            <div class="text-center text-muted p-5">
                <i class="fa-solid fa-comment-slash" style="font-size:50px;"></i>
                <p class="mt-3">Aucune réponse pour cette passation</p>
            </div>
        `;
    } else {
        liste.innerHTML = '';
        passation.reponses.forEach((r, index) => {
            // Création de l'élément de la réponse principale
            let cardReponse = document.createElement('div');
            cardReponse.className = 'reply-item';
            cardReponse.innerHTML = `
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <strong>Réponse ${index + 1}</strong> — <strong class="${getNomClass(r.personne)}">${r.personne}</strong>
                        <small class="text-muted d-block" style="color:#aaa!important; margin-top:2px;">${r.date} à ${r.heure}</small>
                    </div>
                    <button class="btn btn-outline-info btn-sm px-2 py-1 structural-reply-btn">
                        <i class="fa-solid fa-reply"></i> Répondre
                    </button>
                </div>
                <p class="mt-2 mb-2 reply-view-text" style="white-space: pre-line;"></p>
                
                <div class="sub-replies-zone"></div>
            `;
            
            // Injection sécurisée du texte principal
            cardReponse.querySelector('.reply-view-text').textContent = r.texte;
            
            // Action du bouton "Répondre" interne à la carte
            cardReponse.querySelector('.structural-reply-btn').onclick = function() {
                repondre(id, r.id);
            };

            // Rendu des sous-réponses imbriquées (si elles existent)
            let zoneSousReponses = cardReponse.querySelector('.sub-replies-zone');
            if(r.subReplies && r.subReplies.length > 0) {
                r.subReplies.forEach(sub => {
                    let divSub = document.createElement('div');
                    divSub.className = 'sub-reply-item';
                    divSub.innerHTML = `
                        <div>
                            <i class="fa-solid fa-turn-up fa-rotate-90 text-info me-1"></i> 
                            <strong class="${getNomClass(sub.personne)}">${sub.personne}</strong>
                            <small class="text-muted" style="color:#888!important; margin-left:8px;">${sub.date} à ${sub.heure}</small>
                        </div>
                        <p class="mt-2 mb-0 sub-reply-view-text" style="white-space: pre-line;"></p>
                    `;
                    divSub.querySelector('.sub-reply-view-text').textContent = sub.texte;
                    zoneSousReponses.appendChild(divSub);
                });
            }

            liste.appendChild(cardReponse);
        });
    }
    overlay.style.display = 'flex';
}

function fermerOverlay(){ document.getElementById('overlayReponses').style.display = 'none'; document.getElementById('listeReponses').innerHTML = ''; }

</script>
</body>
</html>
